# =====================================================================
# Mise à jour automatique de limites.json pour le suivi des gardiens
# À placer dans le dépôt sous : .github/workflows/maj-limites.yml
# Le fichier outil-limites.mjs doit être à la racine du dépôt,
# à côté de suivi-gardiens-ushl.html.
# =====================================================================
name: Mise à jour des limites de gardiens

on:
  workflow_dispatch: {}        # bouton « Run workflow » manuel dans l'onglet Actions
  schedule:
    - cron: "0 10,22 * * *"    # deux fois par jour (06 h et 18 h, heure du Québec)

permissions:
  contents: write

jobs:
  limites:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Lire le classeur des limites
        run: node outil-limites.mjs

      - name: Publier limites.json s'il a changé
        run: |
          git config user.name "robot-limites"
          git config user.email "actions@users.noreply.github.com"
          git add limites.json debug-limites/ || true
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Mise à jour automatique des limites de gardiens"
            git push
          fi
