# =====================================================================
# Mise à jour automatique de limites.json + alerte courriel de
# dépassement de limite des gardiens.
# À placer dans le dépôt sous : .github/workflows/maj-limites.yml
# Fichiers requis à la racine : outil-limites.mjs et outil-alertes.mjs.
# Secrets requis (Settings → Secrets and variables → Actions) :
#   MAIL_USERNAME : gardienushl@gmail.com
#   MAIL_PASSWORD : le mot de passe d'application Google (16 lettres)
# =====================================================================
name: Mise à jour des limites de gardiens

on:
  workflow_dispatch: {}        # bouton « Run workflow » manuel dans l'onglet Actions
  schedule:
    - cron: "0 10,22 * * *"    # deux fois par jour (06 h et 18 h, heure du Québec)

permissions:
  contents: write

jobs:
  limites:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Lire le classeur des limites
        run: node outil-limites.mjs

      - name: Vérifier les dépassements de limite
        id: alertes
        run: node outil-alertes.mjs

      - name: Envoyer le courriel d'alerte
        if: steps.alertes.outputs.envoyer == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.alertes.outputs.objet }}
          to: ushl_pro@hotmail.com
          from: Robot USHL — Suivi des gardiens <${{ secrets.MAIL_USERNAME }}>
          html_body: file://courriel-alerte.html

      - name: Publier les fichiers modifiés
        run: |
          git config user.name "robot-limites"
          git config user.email "actions@users.noreply.github.com"
          git add limites.json debug-limites/ debug-alertes/ alertes-envoyees.json || true
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "Mise à jour automatique (limites et alertes de gardiens)"
            git push
          fi
